<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>{% block title %}Nexus{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  /* --- GLOBAL VARIABLES --- */
  :root {
    --navy: #0a0f1e; --navy2: #0d1528; --navy3: #111e38;
    --card: #0f1c35; --border: #1a2d50;
    --teal: #00d4b4; --teal2: #00b89a; --teal-dim: #00d4b420;
    --teal-glow: 0 0 40px #00d4b430;
    --amber: #f59e0b; --amber-dim: #f59e0b18;
    --text: #e8eef8; --muted: #6b82a8; --muted2: #3d5278;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--navy); color: var(--text);
    font-family: 'Inter', sans-serif; min-height: 100vh;
  }

  /* Global background grid */
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 60px 60px; opacity: 0.15;
    pointer-events: none; z-index: 0;
  }

  /* --- GLOBAL NAVBAR STYLING --- */
  nav {
    position: sticky; top: 0; z-index: 1000;
    display: flex; align-items: center; gap: 24px;
    padding: 0 40px; height: 64px;
    background: #0a0f1eee; backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo {
    font-family: 'Inter', sans-serif; font-weight: 800; font-size: 1.2rem;
    color: var(--teal); text-decoration: none; white-space: nowrap;
  }
  .nav-logo span { color: var(--text); }

  .nav-search {
    flex: 1; max-width: 560px; display: flex;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .nav-search:focus-within { border-color: var(--teal); box-shadow: var(--teal-glow); }
  .nav-search select {
    background: transparent; border: none; color: var(--teal);
    font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.85rem;
    outline: none; cursor: pointer; padding-left: 14px;
  }
  .nav-search select option { background: var(--card); }
  .nav-search input {
    flex: 1; background: none; border: none; outline: none;
    padding: 10px 0; padding-left: 10px; border-left: 1px solid var(--border);
    font-size: 0.92rem; color: var(--text); font-family: 'Inter', sans-serif;
  }
  .nav-search input::placeholder { color: var(--muted2); }
  .nav-search button {
    background: var(--teal); border: none; padding: 0 20px;
    cursor: pointer; font-family: 'Inter', sans-serif;
    font-weight: 700; font-size: 0.82rem; color: var(--navy);
    transition: background 0.2s;
  }
  .nav-search button:hover { background: var(--teal2); }

  .nav-links { margin-left: auto; display: flex; gap: 24px; align-items: center; }
  .nav-links a { color: var(--muted); text-decoration: none; font-size: 0.88rem; font-weight: 500; transition: color 0.2s; }
  .nav-links a:hover { color: var(--text); }
  .nav-active { color: var(--teal) !important; }
  .nav-btn { background: var(--teal); color: var(--navy) !important; padding: 7px 16px; border-radius: 8px; font-weight: 600 !important; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--navy); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted2); }

  /* Child templates inject page-specific CSS here */
  {% block extra_css %}{% endblock %}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">Research Portal</a>
  <form class="nav-search" action="/search" method="GET" id="globalNavSearchForm">
    <select id="globalSearchType" onchange="updateGlobalSearch()">
      <option value="papers">Papers</option>
      <option value="authors">Authors</option>
    </select>
    <input name="q" type="text" value="{{ query if query is defined else '' }}" placeholder="Search database..." autocomplete="off"/>
    <button type="submit">Go</button>
  </form>
  <div class="nav-links">
    {% if session.role == 'admin' %}
      <a href="/admin">Admin</a>
    {% endif %}
    <a href="/analytics">Analytics</a>
    {% if session.get('username') %}
      <a href="/for-you">For You</a>
      <a href="/profile">{{ session.username }}</a>
      <a href="/logout">Logout</a>
    {% else %}
      <a href="/login">Login</a>
      <a href="/signup" class="nav-btn">Sign Up</a>
    {% endif %}
  </div>
</nav>

{% block content %}
{% endblock %}

<script>
  function updateGlobalSearch() {
    const type = document.getElementById('globalSearchType').value;
    document.getElementById('globalNavSearchForm').action = type === 'authors' ? '/search_authors' : '/search';
  }

  {% block extra_js %}{% endblock %}
</script>

</body>
</html>
